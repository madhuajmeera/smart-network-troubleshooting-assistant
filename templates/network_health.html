<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network Health Analyzer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet"
href="{{ url_for('static',
filename='style.css') }}">
</head>
<body>
    <h1>Network Health Analyzer</h1>

    <form action="/calculate-health" method="post">
        <label> 
            Signal Strength (1-5)
        </label>

        <br>

        <input 
        type="number"
        name="signal"
        min="1"
        max="5" required>

        <br><br>

        <label> Internet Speed (Mbps)</label>

        <br>

        <input 
        type="number" 
        name="speed" required>

        <br><br>

        <label>Call Quality (1-5)</label>

        <br>

        <input 
        type="number"
        name="call"
        min="1"
        max="5" required>

        <br><br>

        <button type="submit">Analyze</button>
    </form>
</body>
</html>
